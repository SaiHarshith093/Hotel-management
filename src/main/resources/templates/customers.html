<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Customer Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="main container">
    <div class="page-header">
        <div>
            <h2>Customer Management</h2>
            <p class="page-subtitle">View, search, and manage hotel customers</p>
        </div>
        <a th:href="@{/customers/add}" class="btn btn-primary">Add Customer</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <section class="card">
        <form th:action="@{/customers}" method="get" class="filter-form">
            <div class="filter-grid">
                <div class="form-group">
                    <label for="search">Search</label>
                    <input type="text" id="search" name="search" th:value="${search}"
                           placeholder="Name, phone, or email...">
                </div>
                <div class="form-group filter-actions">
                    <label>&nbsp;</label>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">Search</button>
                        <a th:href="@{/customers}" class="btn btn-outline">Clear</a>
                    </div>
                </div>
            </div>
        </form>
    </section>

    <section class="card table-card">
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Gender</th>
                    <th>Email</th>
                    <th class="actions-col">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(customers)}">
                    <td colspan="6" class="empty-row">No customers found.</td>
                </tr>
                <tr th:each="customer : ${customers}">
                    <td th:text="${customer.id}">1</td>
                    <td th:text="${customer.name}">John Doe</td>
                    <td th:text="${customer.phone}">+91-9876543210</td>
                    <td th:text="${customer.gender}">MALE</td>
                    <td th:text="${customer.email ?: '-'}">email@example.com</td>
                    <td class="actions-col">
                        <a th:href="@{/customers/{id}(id=${customer.id})}" class="btn btn-sm btn-outline">View</a>
                        <a th:href="@{/customers/edit/{id}(id=${customer.id})}" class="btn btn-sm btn-outline">Edit</a>
                        <form th:action="@{/customers/delete/{id}(id=${customer.id})}" method="post"
                              class="inline-form"
                              sec:authorize="hasRole('ADMIN')"
                              onsubmit="return confirm('Delete this customer?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
