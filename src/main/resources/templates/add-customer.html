<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="app-body">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="app-wrapper">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <main class="main-content">
    <div class="page-header">
        <div>
            <h2>Add Customer</h2>
            <p class="page-subtitle">Register a new customer</p>
        </div>
        <a th:href="@{/customers}" class="btn btn-outline">Back to Customers</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-error" data-error-message th:text="${errorMessage}"></div>

    <section class="card form-card">
        <form th:action="@{/customers/add}" th:object="${customer}" method="post" class="room-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Name <span class="required">*</span></label>
                    <input type="text" id="name" th:field="*{name}" required maxlength="100">
                    <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone <span class="required">*</span></label>
                    <input type="text" id="phone" th:field="*{phone}" required maxlength="20">
                    <span class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
                </div>

                <div class="form-group">
                    <label for="gender">Gender <span class="required">*</span></label>
                    <select id="gender" th:field="*{gender}" required>
                        <option value="">Select gender</option>
                        <option th:each="g : ${genders}"
                                th:value="${g.name()}"
                                th:text="${g.name()}"></option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" maxlength="100">
                    <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                </div>

                <div class="form-group form-group-full">
                    <label for="address">Address</label>
                    <textarea id="address" th:field="*{address}" rows="3" class="textarea"></textarea>
                    <span class="field-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></span>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Customer</button>
                <a th:href="@{/customers}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </section>
    </main>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: modals}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
