<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="app-body">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="app-wrapper">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <main class="main-content">
        <section class="hero">
            <h2>Welcome to Hotel Management System</h2>
            <p>Manage rooms, bookings, customers, and more from one place.</p>
            <div class="dashboard-links">
                <a th:href="@{/dashboard}" class="dashboard-link">Dashboard</a>
                <a th:href="@{/rooms}" class="dashboard-link">Room Management</a>
                <a th:href="@{/customers}" class="dashboard-link">Customer Management</a>
                <a th:href="@{/bookings}" class="dashboard-link">Booking Management</a>
                <a th:href="@{/food-orders}" class="dashboard-link">Food Orders</a>
                <a th:href="@{/bills}" class="dashboard-link">Billing</a>
                <a th:href="@{/checkout}" class="dashboard-link">Guest Checkout</a>
                <a th:href="@{/reports}" class="dashboard-link">Reports</a>
            </div>
        </section>
    </main>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: modals}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
