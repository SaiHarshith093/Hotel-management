<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Login - Hotel Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <h1>Hotel Management</h1>
        <p class="auth-subtitle">Sign in to your account</p>

        <div th:if="${loginError}" class="alert alert-error">
            Invalid username or password.
        </div>
        <div th:if="${logoutSuccess}" class="alert alert-success">
            You have been logged out successfully.
        </div>
        <div th:if="${sessionExpired}" class="alert alert-error">
            Your session has expired. Please sign in again.
        </div>
        <div th:if="${accessDenied}" class="alert alert-error">
            You do not have permission to perform that action.
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
