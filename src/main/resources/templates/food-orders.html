<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Food Orders</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="main container">
    <div class="page-header">
        <div>
            <h2>Food Orders</h2>
            <p class="page-subtitle">View and manage in-room food orders</p>
        </div>
        <a th:href="@{/food-orders/add}" class="btn btn-primary">Add Food Order</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <section class="card">
        <form th:action="@{/food-orders}" method="get" class="filter-form">
            <div class="filter-grid">
                <div class="form-group">
                    <label for="search">Search</label>
                    <input type="text" id="search" name="search" th:value="${search}"
                           placeholder="Order ID, item, customer, room...">
                </div>
                <div class="form-group filter-actions">
                    <label>&nbsp;</label>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">Search</button>
                        <a th:href="@{/food-orders}" class="btn btn-outline">Clear</a>
                    </div>
                </div>
            </div>
        </form>
    </section>

    <section class="card summary-card">
        <div class="summary-row">
            <span class="summary-label">Total Food Amount</span>
            <span class="summary-value"
                  th:text="'₹' + ${#numbers.formatDecimal(totalFoodAmount, 1, 2)}">₹0.00</span>
        </div>
    </section>

    <section class="card table-card">
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Booking</th>
                    <th>Customer</th>
                    <th>Room</th>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Unit Price</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th class="actions-col">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(orders)}">
                    <td colspan="10" class="empty-row">No food orders found.</td>
                </tr>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.id}">1</td>
                    <td th:text="'#' + ${order.bookingId}">#1</td>
                    <td th:text="${order.customerName}">John Doe</td>
                    <td th:text="${order.roomNumber}">101</td>
                    <td th:text="${order.foodItemName}">Sandwich</td>
                    <td th:text="${order.quantity}">1</td>
                    <td th:text="${#numbers.formatDecimal(order.unitPrice, 1, 2)}">50.00</td>
                    <td th:text="${#numbers.formatDecimal(order.totalPrice, 1, 2)}">50.00</td>
                    <td>
                        <span class="badge"
                              th:classappend="${' badge-food-' + #strings.toLowerCase(order.orderStatus.name())}"
                              th:text="${order.orderStatus.name()}">PLACED</span>
                    </td>
                    <td class="actions-col">
                        <form th:action="@{/food-orders/delete/{id}(id=${order.id})}" method="post"
                              class="inline-form"
                              sec:authorize="hasRole('ADMIN')"
                              onsubmit="return confirm('Delete this food order?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                        <span sec:authorize="!hasRole('ADMIN')" class="text-muted">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
