<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<section class="error-page" th:fragment="content(icon)">
    <div class="error-icon" th:text="${icon}">!</div>
    <p class="error-code" th:if="${statusCode != null}" th:text="${statusCode}">400</p>
    <h1 th:text="${errorTitle} ?: 'Something went wrong'">Error</h1>
    <p class="error-message" th:text="${errorMessage} ?: 'An unexpected error occurred.'">Message</p>
    <div class="error-actions">
        <a th:href="@{/dashboard}" class="btn btn-primary">Go to Dashboard</a>
        <button type="button" class="btn btn-outline" onclick="history.back()">Go Back</button>
    </div>
</section>

</body>
</html>
