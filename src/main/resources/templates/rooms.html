<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Room Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="main container">
    <div class="page-header">
        <div>
            <h2>Room Management</h2>
            <p class="page-subtitle">View, search, and manage hotel rooms</p>
        </div>
        <a th:href="@{/rooms/add}" class="btn btn-primary">Add Room</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <section class="card">
        <form th:action="@{/rooms}" method="get" class="filter-form">
            <div class="filter-grid">
                <div class="form-group">
                    <label for="search">Search</label>
                    <input type="text" id="search" name="search" th:value="${search}"
                           placeholder="Room number...">
                </div>
                <div class="form-group">
                    <label for="roomType">Room Type</label>
                    <select id="roomType" name="roomType">
                        <option value="">All Types</option>
                        <option th:each="type : ${roomTypes}"
                                th:value="${type.name()}"
                                th:text="${type.displayName}"
                                th:selected="${selectedRoomType == type}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="">All Statuses</option>
                        <option th:each="s : ${roomStatuses}"
                                th:value="${s.name()}"
                                th:text="${s.name()}"
                                th:selected="${selectedStatus == s}"></option>
                    </select>
                </div>
                <div class="form-group filter-actions">
                    <label>&nbsp;</label>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">Apply Filters</button>
                        <a th:href="@{/rooms}" class="btn btn-outline">Clear</a>
                    </div>
                </div>
            </div>
        </form>
    </section>

    <section class="card table-card">
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Room Number</th>
                    <th>Room Type</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th class="actions-col">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(rooms)}">
                    <td colspan="6" class="empty-row">No rooms found.</td>
                </tr>
                <tr th:each="room : ${rooms}">
                    <td th:text="${room.id}">1</td>
                    <td th:text="${room.roomNumber}">101</td>
                    <td th:text="${room.roomType.displayName}">Luxury Double</td>
                    <td th:text="${#numbers.formatDecimal(room.pricePerNight, 1, 2)}">8500.00</td>
                    <td>
                        <span class="badge"
                              th:classappend="${' badge-' + #strings.toLowerCase(room.status.name())}"
                              th:text="${room.status.name()}">AVAILABLE</span>
                    </td>
                    <td class="actions-col">
                        <a th:href="@{/rooms/edit/{id}(id=${room.id})}" class="btn btn-sm btn-outline">Edit</a>
                        <form th:action="@{/rooms/delete/{id}(id=${room.id})}" method="post"
                              class="inline-form"
                              sec:authorize="hasRole('ADMIN')"
                              onsubmit="return confirm('Delete this room?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
