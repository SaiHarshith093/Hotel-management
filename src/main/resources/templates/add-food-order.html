<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="app-body">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="app-wrapper">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <main class="main-content">
    <div class="page-header">
        <div>
            <h2>Add Food Order</h2>
            <p class="page-subtitle">Place a food order for an active booking</p>
        </div>
        <a th:href="@{/food-orders}" class="btn btn-outline">Back to Orders</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-error" data-error-message th:text="${errorMessage}"></div>

    <section class="card form-card">
        <h3 class="section-title">Menu</h3>
        <ul class="menu-list" th:if="${!#lists.isEmpty(menuItems)}">
            <li th:each="item : ${menuItems}">
                <span th:text="${item.name}">Sandwich</span>
                <span th:text="'₹' + ${#numbers.formatDecimal(item.price, 1, 2)}">₹50.00</span>
            </li>
        </ul>
        <p th:if="${#lists.isEmpty(menuItems)}" class="field-hint">No menu items available.</p>
    </section>

    <section class="card form-card">
        <form th:action="@{/food-orders/add}" th:object="${foodOrder}" method="post" class="room-form" id="foodOrderForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-grid">
                <div class="form-group">
                    <label for="bookingId">Booking <span class="required">*</span></label>
                    <select id="bookingId" th:field="*{bookingId}" required>
                        <option value="">Select booking</option>
                        <option th:each="booking : ${activeBookings}"
                                th:value="${booking.id}"
                                th:text="'#' + ${booking.id} + ' - ' + ${booking.customerName} + ' (Room ' + ${booking.roomNumber} + ')'"></option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('bookingId')}"
                          th:errors="*{bookingId}"></span>
                    <p th:if="${#lists.isEmpty(activeBookings)}" class="field-hint">
                        No active bookings available for food orders.
                    </p>
                </div>

                <div class="form-group">
                    <label for="foodItemId">Food Item <span class="required">*</span></label>
                    <select id="foodItemId" th:field="*{foodItemId}" required>
                        <option value="">Select item</option>
                        <option th:each="item : ${menuItems}"
                                th:value="${item.id}"
                                th:attr="data-price=${item.price}"
                                th:text="${item.name + ' - ₹' + item.price}"></option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('foodItemId')}"
                          th:errors="*{foodItemId}"></span>
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity <span class="required">*</span></label>
                    <input type="number" id="quantity" th:field="*{quantity}" min="1" value="1" required>
                    <span class="field-error" th:if="${#fields.hasErrors('quantity')}"
                          th:errors="*{quantity}"></span>
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <input type="text" id="notes" th:field="*{notes}" maxlength="255"
                           placeholder="Special instructions (optional)">
                </div>
            </div>

            <div class="amount-preview">
                <span>Order Amount:</span>
                <strong id="orderAmount">₹0.00</strong>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary"
                        th:disabled="${#lists.isEmpty(activeBookings) or #lists.isEmpty(menuItems)}">
                    Place Order
                </button>
                <a th:href="@{/food-orders}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </section>
    </main>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: modals}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:src="@{/js/food-order.js}"></script>
</body>
</html>
