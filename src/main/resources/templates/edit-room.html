<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="app-body">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="app-wrapper">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <main class="main-content">
    <div class="page-header">
        <div>
            <h2>Edit Room</h2>
            <p class="page-subtitle">Update room details</p>
        </div>
        <a th:href="@{/rooms}" class="btn btn-outline">Back to Rooms</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-error" data-error-message th:text="${errorMessage}"></div>

    <section class="card form-card">
        <form th:action="@{/rooms/edit/{id}(id=${room.id})}" th:object="${room}" method="post" class="room-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{id}"/>

            <div class="form-grid">
                <div class="form-group">
                    <label for="roomNumber">Room Number <span class="required">*</span></label>
                    <input type="text" id="roomNumber" th:field="*{roomNumber}" required maxlength="10">
                    <span class="field-error" th:if="${#fields.hasErrors('roomNumber')}"
                          th:errors="*{roomNumber}"></span>
                </div>

                <div class="form-group">
                    <label for="roomType">Room Type <span class="required">*</span></label>
                    <select id="roomType" th:field="*{roomType}" required>
                        <option value="">Select type</option>
                        <option th:each="type : ${roomTypes}"
                                th:value="${type.name()}"
                                th:text="${type.displayName}"></option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('roomType')}"
                          th:errors="*{roomType}"></span>
                </div>

                <div class="form-group">
                    <label for="pricePerNight">Price (per night) <span class="required">*</span></label>
                    <input type="number" id="pricePerNight" th:field="*{pricePerNight}"
                           step="0.01" min="0.01" required>
                    <span class="field-error" th:if="${#fields.hasErrors('pricePerNight')}"
                          th:errors="*{pricePerNight}"></span>
                </div>

                <div class="form-group">
                    <label for="status">Status <span class="required">*</span></label>
                    <select id="status" th:field="*{status}" required>
                        <option th:each="s : ${roomStatuses}"
                                th:value="${s.name()}"
                                th:text="${s.name()}"></option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('status')}"
                          th:errors="*{status}"></span>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Room</button>
                <a th:href="@{/rooms}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </section>
    </main>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: modals}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
